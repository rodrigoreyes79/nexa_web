baseURL = 'https://nexa.uno/'
title = 'NexaUno'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = false
disableKinds = ['taxonomy', 'term']

# Pretty URLs, no trailing index.html noise
[outputs]
  home = ['HTML', 'RSS', 'SITEMAP']

[params]
  description = 'NexaUno — Fintech solutions for modern businesses. Payment reconciliation and integrations for Stripe, Mollie, Magento and WooCommerce.'
  author = 'Rodrigo Reyes'
  email = 'rodrigo@nexa.uno'
  # Used across legal pages
  legalName = 'Rodrigo Reyes'
  nif = 'Z1837378M'
  address = 'Av. Lazarejo 86, 28232 Las Rozas de Madrid, Madrid, España'
  # Date the legal docs were last reviewed (update when you change them)
  legalUpdated = '2026-06-24'

# ---------------------------------------------------------------------------
# Languages
# ---------------------------------------------------------------------------
[languages]
  [languages.en]
    label = 'English'
    locale = 'en'
    contentDir = 'content/en'
    weight = 1
    title = 'NexaUno'
    [languages.en.params]
      tagline = 'Fintech solutions for modern businesses'

    [[languages.en.menus.main]]
      name = 'Services'
      pageRef = '/services'
      weight = 10
    [[languages.en.menus.main]]
      name = 'Pricing'
      pageRef = '/pricing'
      weight = 20
    [[languages.en.menus.main]]
      name = 'About'
      pageRef = '/about'
      weight = 30
    [[languages.en.menus.main]]
      name = 'Contact'
      pageRef = '/contact'
      weight = 40

    [[languages.en.menus.footer]]
      name = 'Legal notice'
      pageRef = '/legal/aviso-legal'
      weight = 10
    [[languages.en.menus.footer]]
      name = 'Privacy policy'
      pageRef = '/legal/privacy'
      weight = 20
    [[languages.en.menus.footer]]
      name = 'Cookies policy'
      pageRef = '/legal/cookies'
      weight = 30
    [[languages.en.menus.footer]]
      name = 'Terms of service'
      pageRef = '/legal/terms'
      weight = 40
    [[languages.en.menus.footer]]
      name = 'Refunds & cancellations'
      pageRef = '/legal/refunds'
      weight = 50

  [languages.es]
    label = 'Español'
    locale = 'es'
    contentDir = 'content/es'
    weight = 2
    title = 'NexaUno'
    [languages.es.params]
      tagline = 'Soluciones fintech para empresas modernas'

    [[languages.es.menus.main]]
      name = 'Servicios'
      pageRef = '/services'
      weight = 10
    [[languages.es.menus.main]]
      name = 'Precios'
      pageRef = '/pricing'
      weight = 20
    [[languages.es.menus.main]]
      name = 'Nosotros'
      pageRef = '/about'
      weight = 30
    [[languages.es.menus.main]]
      name = 'Contacto'
      pageRef = '/contact'
      weight = 40

    [[languages.es.menus.footer]]
      name = 'Aviso legal'
      pageRef = '/legal/aviso-legal'
      weight = 10
    [[languages.es.menus.footer]]
      name = 'Política de privacidad'
      pageRef = '/legal/privacy'
      weight = 20
    [[languages.es.menus.footer]]
      name = 'Política de cookies'
      pageRef = '/legal/cookies'
      weight = 30
    [[languages.es.menus.footer]]
      name = 'Términos del servicio'
      pageRef = '/legal/terms'
      weight = 40
    [[languages.es.menus.footer]]
      name = 'Reembolsos y cancelaciones'
      pageRef = '/legal/refunds'
      weight = 50

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
